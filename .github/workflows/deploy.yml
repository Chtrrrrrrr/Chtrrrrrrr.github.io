name: Deploy to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build file browser
        working-directory: ./file-browser
        run: |
          npm install
          node build.js ./gh-pages-temp    # 生成到 file-browser/gh-pages-temp/
      
      - name: Prepare gh-pages
        run: |
          mkdir -p gh-pages
          
          # 1. 复制 main 的所有文件
          cp -r main/* gh-pages/ 2>/dev/null || true
          cp -r main/.* gh-pages/ 2>/dev/null || true
          
          # 2. 删除不需要的
          rm -rf gh-pages/file-browser
          rm -rf gh-pages/.git
          
          # 3. 🔥 修正：从 file-browser/ 目录移动 fb/
          mv main/file-browser/gh-pages-temp/fb gh-pages/
          rm -rf main/file-browser/gh-pages-temp
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true