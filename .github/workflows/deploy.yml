name: Deploy to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build file browser
        run: |
          cd file-browser
          npm install
          node build.js ./gh-pages-temp
      
      - name: Prepare gh-pages
        run: |
          mkdir -p gh-pages
          
          # 复制仓库根目录所有文件
          cp -r * gh-pages/ 2>/dev/null || true
          cp -r .* gh-pages/ 2>/dev/null || true
          
          # 删除不需要的
          rm -rf gh-pages/file-browser
          rm -rf gh-pages/.git
          rm -rf gh-pages/gh-pages
          
          # 移动 fb/ 到根目录
          mv file-browser/gh-pages-temp/fb gh-pages/
          rm -rf file-browser/gh-pages-temp
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true