name: Deploy File Browser

on:
  push:
    branches: [main]  # 或 master，看你的默认分支
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build
        run: |
          cd file-browser           # 进入子目录
          npm install               # 安装依赖
          node build.js             # 运行构建（扫描上级目录 main/）
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./file-browser/dist   # 部署 dist 目录
          force_orphan: true        # 只保留最新提交，干净